<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebBrief</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #f8fafc; }

      /* Estilos del contenido editable de TipTap */
      .tiptap { outline: none; min-height: 300px; }
      .tiptap h1 { font-size: 2em; font-weight: 700; margin-bottom: 0.5em; color: #0f172a; }
      .tiptap h2 { font-size: 1.5em; font-weight: 600; margin-bottom: 0.4em; color: #0f172a; }
      .tiptap h3 { font-size: 1.2em; font-weight: 600; margin-bottom: 0.4em; color: #0f172a; }
      .tiptap p  { line-height: 1.7; margin-bottom: 0.75em; color: #374151; }
      .tiptap ul, .tiptap ol { margin-left: 1.5em; margin-bottom: 0.75em; }
      .tiptap li { line-height: 1.7; color: #374151; }
      .tiptap img { max-width: 100%; border-radius: 6px; margin: 8px 0; display: block; }
      .tiptap a { color: #2563eb; text-decoration: underline; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
