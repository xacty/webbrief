    <text x="36" y="248" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="16">monograma W integrado. Sobria,</text>
    <text x="36" y="274" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="16">institucional y fácil de usar en UI.</text>
